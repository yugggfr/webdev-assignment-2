<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg: #f0ede8;
        --card: #fff;
        --border: #ddd9d0;
        --text: #1a1714;
        --muted: #7a756e;
        --accent: #d4522a;
        --accent-light: #fdf0eb;
        --shadow: 0 2px 12px rgba(0,0,0,0.08);
      }

      body {
        font-family: 'DM Sans', sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        padding: 40px 20px;
      }

      h1 {
        font-family: 'Syne', sans-serif;
        font-size: 2rem;
        font-weight: 700;
        letter-spacing: -0.5px;
        margin-bottom: 32px;
        color: var(--text);
      }

      h1 span {
        color: var(--accent);
      }

      .container {
        max-width: 760px;
        margin: 0 auto;
      }

      .layout {
        display: grid;
        grid-template-columns: 280px 1fr;
        gap: 20px;
        align-items: start;
      }

      @media (max-width: 600px) {
        .layout { grid-template-columns: 1fr; }
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 20px;
        box-shadow: var(--shadow);
      }

      .card h3 {
        font-family: 'Syne', sans-serif;
        font-size: 0.8rem;
        font-weight: 600;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 16px;
      }

      /* Search */
      .search-wrap {
        position: relative;
      }

      .input-row {
        display: flex;
        gap: 8px;
      }

      #search-city {
        flex: 1;
        padding: 10px 14px;
        border: 1.5px solid var(--border);
        border-radius: 8px;
        font-family: 'DM Sans', sans-serif;
        font-size: 0.95rem;
        background: var(--bg);
        color: var(--text);
        outline: none;
        transition: border-color 0.2s;
      }

      #search-city:focus {
        border-color: var(--accent);
        background: #fff;
      }

      button[type="submit"] {
        padding: 10px 16px;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 8px;
        font-family: 'Syne', sans-serif;
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.2s;
        white-space: nowrap;
      }

      button[type="submit"]:hover { opacity: 0.85; }

      /* Suggestions dropdown */
      #suggestions {
        position: absolute;
        top: calc(100% + 4px);
        left: 0;
        right: 0;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 10px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.1);
        z-index: 100;
        overflow: hidden;
        display: none;
      }

      #suggestions.visible { display: block; }

      .suggestion-item {
        padding: 10px 14px;
        cursor: pointer;
        font-size: 0.9rem;
        transition: background 0.15s;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .suggestion-item:hover { background: var(--accent-light); }

      .suggestion-item .flag {
        font-size: 1rem;
      }

      /* History */
      .history-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-top: 4px;
      }

      .history-item {
        padding: 8px 12px;
        background: var(--bg);
        border-radius: 8px;
        font-size: 0.88rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: background 0.15s;
        border: 1px solid transparent;
      }

      .history-item:hover {
        background: var(--accent-light);
        border-color: #f0c5b3;
      }

      .history-item::before {
        content: "↗";
        color: var(--muted);
        font-size: 0.75rem;
      }

      .history-empty {
        font-size: 0.85rem;
        color: var(--muted);
        font-style: italic;
      }

      /* Weather Info */
      #fetch-data-box {
        min-height: 80px;
      }

      .weather-card {
        animation: fadeIn 0.3s ease;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(6px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .city-name {
        font-family: 'Syne', sans-serif;
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 4px;
      }

      .country-badge {
        display: inline-block;
        background: var(--accent);
        color: #fff;
        font-size: 0.7rem;
        font-weight: 600;
        padding: 2px 8px;
        border-radius: 20px;
        margin-left: 8px;
        vertical-align: middle;
        font-family: 'Syne', sans-serif;
        letter-spacing: 1px;
      }

      .temp-big {
        font-family: 'Syne', sans-serif;
        font-size: 3rem;
        font-weight: 700;
        color: var(--accent);
        line-height: 1;
        margin: 12px 0 4px;
      }

      .weather-condition {
        font-size: 1rem;
        color: var(--muted);
        text-transform: capitalize;
        margin-bottom: 16px;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 12px;
      }

      .stat-box {
        background: var(--bg);
        border-radius: 10px;
        padding: 12px;
      }

      .stat-label {
        font-size: 0.72rem;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: var(--muted);
        font-weight: 500;
        margin-bottom: 4px;
      }

      .stat-value {
        font-family: 'Syne', sans-serif;
        font-size: 1.1rem;
        font-weight: 600;
      }

      .placeholder-text {
        color: var(--muted);
        font-size: 0.9rem;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 0;
      }

      .error-text {
        color: var(--accent);
        font-size: 0.9rem;
        padding: 8px 0;
      }

      .loading {
        color: var(--muted);
        font-size: 0.9rem;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .spinner {
        width: 16px;
        height: 16px;
        border: 2px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        flex-shrink: 0;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Async <span>Weather</span> Tracker</h1>

      <div class="layout">
        <!-- Left column -->
        <div style="display:flex;flex-direction:column;gap:16px;">

          <div class="card" id="first-search">
            <h3>Search City</h3>
            <form action="" id="search-form">
              <div class="search-wrap">
                <div class="input-row">
                  <input type="text" id="search-city" placeholder="Delhi, Mumbai..." autocomplete="off" />
                  <button type="submit">Go</button>
                </div>
                <div id="suggestions"></div>
              </div>
            </form>
          </div>

          <div class="card" id="search-history-card">
            <h3>Search History</h3>
            <div id="search-cities-box"></div>
          </div>

        </div>

        <!-- Right column -->
        <div class="card" id="weather-info-box">
          <h3>Weather Info</h3>
          <div id="fetch-data-box">
            <p class="placeholder-text">🌤 Search a city to see weather</p>
          </div>
        </div>
      </div>
    </div>

    <script>
      const API_KEY = "88d1e046755cb245bfd202f38d0cdcc9";
      const cityInput = document.querySelector("#search-city");
      const form = document.querySelector("#search-form");
      const weather = document.querySelector("#fetch-data-box");
      const historyBox = document.querySelector("#search-cities-box");
      const suggestionsBox = document.querySelector("#suggestions");

      // Popular cities for suggestions
      const CITIES = [
        "Delhi","Mumbai","Chennai","Kolkata","Bangalore","Hyderabad","Pune","Ahmedabad",
        "Jaipur","Lucknow","Surat","Nagpur","Patna","Bhopal","Indore","Chandigarh",
        "London","New York","Paris","Tokyo","Sydney","Dubai","Singapore","Toronto",
        "Berlin","Rome","Madrid","Amsterdam","Bangkok","Seoul","Beijing","Shanghai",
        "Los Angeles","Chicago","Houston","Phoenix","San Francisco","Miami","Seattle",
        "Cairo","Lagos","Nairobi","Johannesburg","Casablanca","Cape Town",
        "Moscow","Istanbul","Athens","Vienna","Warsaw","Prague","Budapest","Lisbon",
        "Mexico City","Buenos Aires","São Paulo","Lima","Bogotá","Santiago","Caracas",
        "Karachi","Lahore","Dhaka","Colombo","Kathmandu","Kabul","Islamabad",
        "Riyadh","Tehran","Baghdad","Beirut","Amman","Kuwait City","Doha","Abu Dhabi",
        "Kuala Lumpur","Jakarta","Manila","Ho Chi Minh City","Hanoi","Colombo"
      ];

      function getSuggestions(query) {
        if (!query || query.length < 2) return [];
        const q = query.toLowerCase();
        return CITIES.filter(c => c.toLowerCase().startsWith(q)).slice(0, 6);
      }

      function showSuggestions(query) {
        const matches = getSuggestions(query);
        if (matches.length === 0) {
          suggestionsBox.innerHTML = "";
          suggestionsBox.classList.remove("visible");
          return;
        }
        suggestionsBox.innerHTML = matches.map(c =>
          `<div class="suggestion-item" data-city="${c}">
            <span>🏙</span>${c}
          </div>`
        ).join("");
        suggestionsBox.classList.add("visible");
        suggestionsBox.querySelectorAll(".suggestion-item").forEach(item => {
          item.addEventListener("mousedown", (e) => {
            e.preventDefault();
            cityInput.value = item.dataset.city;
            suggestionsBox.classList.remove("visible");
            getWeatherInfo(item.dataset.city);
          });
        });
      }

      cityInput.addEventListener("input", () => showSuggestions(cityInput.value.trim()));
      cityInput.addEventListener("blur", () => {
        setTimeout(() => suggestionsBox.classList.remove("visible"), 150);
      });
      cityInput.addEventListener("focus", () => {
        if (cityInput.value.trim()) showSuggestions(cityInput.value.trim());
      });

      // History management
      function getHistory() {
        try { return JSON.parse(localStorage.getItem("weatherHistory") || "[]"); }
        catch { return []; }
      }

      function addToHistory(city) {
        let history = getHistory();
        history = [city, ...history.filter(c => c.toLowerCase() !== city.toLowerCase())].slice(0, 8);
        localStorage.setItem("weatherHistory", JSON.stringify(history));
        renderHistory();
      }

      function renderHistory() {
        const history = getHistory();
        if (history.length === 0) {
          historyBox.innerHTML = `<p class="history-empty">No searches yet</p>`;
          return;
        }
        historyBox.innerHTML = `<div class="history-list">${
          history.map(c => `<div class="history-item" data-city="${c}">${c}</div>`).join("")
        }</div>`;
        historyBox.querySelectorAll(".history-item").forEach(item => {
          item.addEventListener("click", () => {
            cityInput.value = item.dataset.city;
            getWeatherInfo(item.dataset.city);
          });
        });
      }

      async function getWeatherInfo(city) {
        if (!city) return;
        suggestionsBox.classList.remove("visible");

        weather.innerHTML = `<div class="loading"><div class="spinner"></div>Fetching weather for ${city}…</div>`;

        try {
          const response = await fetch(
            `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=metric`
          );
          if (!response.ok) throw new Error("City not found");
          const data = await response.json();

          const icon = getWeatherIcon(data.weather[0].main);

          weather.innerHTML = `
            <div class="weather-card">
              <div class="city-name">${data.name} <span class="country-badge">${data.sys.country}</span></div>
              <div class="temp-big">${Math.round(data.main.temp)}°C</div>
              <div class="weather-condition">${icon} ${data.weather[0].description}</div>
              <div class="stats-grid">
                <div class="stat-box">
                  <div class="stat-label">Feels Like</div>
                  <div class="stat-value">${Math.round(data.main.feels_like)}°C</div>
                </div>
                <div class="stat-box">
                  <div class="stat-label">Humidity</div>
                  <div class="stat-value">${data.main.humidity}%</div>
                </div>
                <div class="stat-box">
                  <div class="stat-label">Wind</div>
                  <div class="stat-value">${data.wind.speed} m/s</div>
                </div>
                <div class="stat-box">
                  <div class="stat-label">Pressure</div>
                  <div class="stat-value">${data.main.pressure} hPa</div>
                </div>
              </div>
            </div>`;

          addToHistory(data.name);
        } catch (err) {
          weather.innerHTML = `<p class="error-text">⚠ ${err.message || "Couldn't fetch weather. Check city name."}</p>`;
        }
      }

      function getWeatherIcon(condition) {
        const icons = {
          Clear: "☀️", Clouds: "☁️", Rain: "🌧", Drizzle: "🌦",
          Thunderstorm: "⛈", Snow: "❄️", Mist: "🌫", Fog: "🌫",
          Haze: "🌫", Smoke: "💨", Dust: "💨", Sand: "💨", Tornado: "🌪"
        };
        return icons[condition] || "🌤";
      }

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const val = cityInput.value.trim();
        if (val) getWeatherInfo(val);
      });

      renderHistory();
    </script>
  </body>
</html>
